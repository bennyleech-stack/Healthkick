<title>Mobility</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f07;--bg2:#0f1a0b;--bg3:#142010;--card:#0d1a09;--card2:#162c10;
  --border:#1a2e14;--border2:#243d1c;
  --gold:#c8a84b;--gold-d:rgba(200,168,75,.12);--gold-glow:rgba(200,168,75,.2);
  --accent:#7ed957;--accent-d:rgba(126,217,87,.1);
  --orange:#ff8c42;--red:#ff5252;--blue:#4da6ff;--purple:#a78bfa;
  --text:#e8f5e0;--text2:#6a8f5a;--text3:#2a4020;
  --r:14px;--rs:10px;--rm:22px;
}
html,body{position:fixed;inset:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;width:100%}
#app{display:flex;flex-direction:column;position:fixed;inset:0;max-width:430px;margin:0 auto}
.hdr{padding:20px 16px 0;flex-shrink:0}
.hdr-eyebrow{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between}
.hdr-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1.1}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:3px}
.hub-link{font-size:10px;color:var(--text3);text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-weight:600;flex-shrink:0}
.tabs{display:flex;gap:0;margin:14px 16px 0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:3px;flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;color:var(--text3);border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif}
.tab.on{background:var(--card2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.4)}
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:100px}
#scroll::-webkit-scrollbar{display:none}
.sec{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.4px;padding:16px 16px 8px;font-weight:700}

/* ROUTINE IDLE */
.day-badge{display:inline-flex;align-items:center;gap:6px;background:var(--gold-d);border:1px solid rgba(200,168,75,.3);border-radius:20px;padding:5px 12px;margin:12px 16px 0}
.day-num{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--gold)}
.day-lbl{font-size:10px;color:var(--text3);font-weight:600}
.time-est{margin:10px 16px 0;font-size:11px;color:var(--text2)}
.preview-strip{display:flex;flex-direction:column;gap:6px;margin:12px 16px}
.pv-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px}
.pv-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);width:16px;flex-shrink:0}
.pv-thumb{width:34px;height:44px;flex-shrink:0;border-radius:6px;overflow:hidden}
.pv-thumb svg{width:100%;height:100%;display:block}
.pv-name{font-size:12px;font-weight:600;color:var(--text)}
.pv-side{font-size:9px;color:var(--text3)}
.start-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 16px 0;padding:16px;border-radius:var(--rs);background:linear-gradient(135deg,var(--gold),var(--accent));color:#0a0f07;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 4px 24px var(--gold-glow);width:calc(100% - 32px)}
.start-btn:active{opacity:.85;transform:scale(.98)}

/* PLAYER */
.player{display:flex;flex-direction:column;align-items:center;padding:20px 16px 0}
.phase-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:var(--text3)}
.phase-lbl.hold{color:var(--accent)}
.phase-lbl.getready{color:var(--gold)}
.ring-wrap{position:relative;width:210px;height:210px;margin:14px 0}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:44px;font-weight:700;color:var(--text)}
.stretch-thumb{width:120px;height:150px;margin:6px 0}
.stretch-thumb svg{width:100%;height:100%;display:block}
.stretch-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;text-align:center;margin-top:8px}
.stretch-side{font-size:11px;color:var(--gold);font-weight:700;margin-top:2px}
.stretch-cue{font-size:11.5px;color:var(--text2);text-align:center;margin-top:8px;line-height:1.5;padding:0 10px}
.stretch-progress{font-size:10px;color:var(--text3);margin-top:10px;font-family:'JetBrains Mono',monospace}
.player-controls{display:flex;gap:10px;margin-top:18px;width:100%;padding:0 4px}
.ctrl-btn{flex:1;padding:12px;border-radius:var(--rs);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.ctrl-btn.stop{color:var(--red);border-color:rgba(255,82,82,.3)}
.done-wrap{text-align:center;padding:40px 16px}
.done-check{width:64px;height:64px;border-radius:50%;background:var(--accent-d);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px}
.done-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text)}
.done-sub{font-size:12px;color:var(--text3);margin-top:6px}

/* CHECKLIST (existing) */
.pill-toggle{display:flex;gap:0;margin:12px 16px 0;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px}
.pill{flex:1;padding:7px 4px;text-align:center;border-radius:16px;font-size:10.5px;font-weight:700;cursor:pointer;color:var(--text3);border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif}
.pill.on{background:var(--card2);color:var(--text)}
.progress-wrap{margin:14px 16px 4px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-lbl{font-size:11px;color:var(--text2);font-weight:600}
.progress-frac{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold);font-weight:600}
.progress-track{height:7px;background:var(--bg3);border-radius:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:5px;transition:width .3s}
.drill{margin:0 16px 8px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 13px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .15s}
.drill.done{border-color:rgba(126,217,87,.35);background:var(--accent-d)}
.d-check{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.d-check.done{background:var(--accent);border-color:var(--accent)}
.d-check.done::after{content:'\2713';font-size:13px;font-weight:800;color:#0a0f07}
.d-body{flex:1;min-width:0}
.d-name{font-size:13px;font-weight:600;color:var(--text)}
.d-name.done{color:var(--text2);text-decoration:line-through;text-decoration-color:var(--text3)}
.d-spec{font-size:10.5px;color:var(--text3);margin-top:2px}
.note-box{margin:6px 16px 4px;padding:11px 14px;background:rgba(200,168,75,.06);border:1px solid rgba(200,168,75,.25);border-radius:var(--rs);font-size:10.5px;color:var(--gold);line-height:1.5}
.reset-btn{margin:4px 16px 20px;text-align:center}
.reset-btn button{background:none;border:none;color:var(--text3);font-size:10px;text-decoration:underline;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;padding:8px}

/* STATS */
.streak-row{display:flex;gap:8px;margin:14px 16px 0}
.streak-badge{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px}
.streak-num{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--gold)}
.streak-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:1px}
.stats-card{margin:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stats-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-cell{background:var(--bg3);border-radius:var(--rs);padding:10px 12px}
.stat-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent)}
.stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-top:2px}
.week-strip{display:flex;gap:5px;margin-top:12px}
.week-day{flex:1;aspect-ratio:1;border-radius:7px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);font-weight:700}
.week-day.hit{background:var(--accent-d);border-color:rgba(126,217,87,.4);color:var(--accent)}
.week-day.today{border-color:var(--gold)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:24px;font-size:12px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:100;white-space:nowrap}
.flash-pulse{animation:flashPulse .5s ease}
@keyframes flashPulse{0%{background:rgba(126,217,87,.35)}100%{background:var(--bg)}}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<script>

t": "<g stroke=\"#c8a84b\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"50\" y1=\"70\" x2=\"50\" y2=\"42\"/><line x1=\"50\" y1=\"45\" x2=\"80\" y2=\"45\"/></g><g stroke=\"#7ed957\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"80\" y1=\"45\" x2=\"80\" y2=\"62\"/><line x1=\"70\" y1=\"35\" x2=\"80\" y2=\"55\"/></g><circle cx=\"50\" cy=\"34\" r=\"8\" fill=\"#c8a84b\"/>", "wrist_flex": "<g stroke=\"#c8a84b\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"50\" y1=\"70\" x2=\"50\" y2=\"42\"/><line x1=\"50\" y1=\"45\" x2=\"80\" y2=\"45\"/></g><g stroke=\"#7ed957\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"80\" y1=\"45\" x2=\"80\" y2=\"26\"/><line x1=\"88\" y1=\"32\" x2=\"76\" y2=\"45\"/></g><circle cx=\"50\" cy=\"34\" r=\"8\" fill=\"#c8a84b\"/>", "butterfly": "<g stroke=\"#7ed957\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"50\" y1=\"98\" x2=\"28\" y2=\"104\"/><line x1=\"28\" y1=\"104\" x2=\"47\" y2=\"112\"/><line x1=\"50\" y1=\"98\" x2=\"72\" y2=\"104\"/><line x1=\"72\" y1=\"104\" x2=\"53\" y2=\"112\"/></g><g stroke=\"#c8a84b\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"50\" y1=\"98\" x2=\"53\" y2=\"76\"/><line x1=\"53\" y1=\"80\" x2=\"47\" y2=\"110\"/></g><circle cx=\"54\" cy=\"68\" r=\"8\" fill=\"#c8a84b\"/>", "itband": "<line x1=\"15\" y1=\"118\" x2=\"88\" y2=\"118\" stroke=\"#243d1c\" stroke-width=\"3\" stroke-linecap=\"round\"/><g stroke=\"#c8a84b\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"45\" y1=\"85\" x2=\"43\" y2=\"102\"/><line x1=\"43\" y1=\"102\" x2=\"42\" y2=\"118\"/><line x1=\"45\" y1=\"85\" x2=\"38\" y2=\"55\"/></g><g stroke=\"#7ed957\" stroke-width=\"6\" stroke-linecap=\"round\" fill=\"none\"><line x1=\"45\" y1=\"85\" x2=\"58\" y2=\"100\"/><line x1=\"58\" y1=\"100\" x2=\"65\" y2=\"116\"/><line x1=\"38\" y1=\"58\" x2=\"25\" y2=\"40\"/></g><circle cx=\"36\" cy=\"48\" r=\"8\" fill=\"#c8a const POSE_META = {
  hamstring:{name:'Standing Hamstring Stretch', cue:'Front heel down, back mostly straight, hinge from the hips.'},
  quad:{name:'Standing Quad Stretch', cue:'Knees together, pull heel toward glute, stand tall.'},
  calf_gastroc:{name:'Calf Stretch (Gastrocnemius)', cue:'Back leg straight, heel down, lean into the wall.'},
  soleus:{name:'Soleus Stretch (bent-knee calf)', cue:'Back knee soft, heel down, lean in gently.'},
  couch:{name:'Kneeling Hip Flexor Stretch (Couch)', cue:'Back knee down, squeeze the glute, chest tall.'},
  piriformis:{name:'Seated Figure-4 (Piriformis)', cue:'Ankle over opposite knee, lean forward gently.'},
  wrist_ext:{name:'Wrist Extensor Stretch', cue:'Arm out, wrist bent down, gently pull with other hand.'},
  wrist_flex:{name:'Wrist Flexor Stretch', cue:'Arm out, wrist bent back, gently pull fingers toward you.'},
  butterfly:{name:'Butterfly Groin Stretch', cue:'Soles together, let knees relax down, lean forward slightly.'},
  itband:{name:'Standing IT Band / Glute Stretch', cue:'Cross the back leg behind, reach overhead, lean away.'},
  ankle_dorsi:{name:'Ankle Dorsiflexion (Wall) Stretch', cue:'Knee drives over the toes, heel stays flat.'},
  forward_fold:{name:'Seated Forward Fold (both legs)', cue:'Legs extended together, hinge from the hips toward your toes.'},
  glute_bridge_hold:{name:'Single-Leg Glute Bridge Hold', cue:'Squeeze the glute hard, keep hips level, avoid dipping or rotating.'}
};

const HOLD=30, TRANS=10;

/* Every day: hip flexor (couch, both sides) + both wrist stretches \u2014 quick, universally relevant, easy daily habit.
   Alternating day-to-day: glute activation (both sides) vs. ankle dorsiflexion (both sides) \u2014
   these are your two named problem areas, so instead of touching each once a week (too thin per
   Huberman's own protocol, which calls for near-daily work per area) they now land ~3-4x/week each,
   which is a real, meaningful dose \u2014 while still keeping every session symmetric L/R.
   One bilateral slot rotates daily for variety (groin/hamstring). 7 units/day = ~4:40, under the cap. */
const ALTERNATING_POOL=['glute_bridge_hold','ankle_dorsi'];
const BILATERAL_POOL=['butterfly','forward_fold'];

function epochDay(){ return Math.floor(Date.now()/86400000); }
function todaysFocus(){
  const d=epochDay();
  return { alt: ALTERNATING_POOL[d % ALTERNATING_POOL.length], bi: BILATERAL_POOL[d % BILATERAL_POOL.length] };
}
function todaysRoutine(){
  const f=todaysFocus();
  return [
    {pose:'couch', side:'L'},
    {pose:'couch', side:'R'},
    {pose:f.alt, side:'L'},
    {pose:f.alt, side:'R'},
    {pose:f.bi, side:'B'},
    {pose:'wrist_ext', side:'B'},
    {pose:'wrist_flex', side:'B'}
  ];
}
function sideLabel(s){ return s==='L'?'Left side':s==='R'?'Right side':'Both sides'; }
function poseSvg(id, mirror){
  const inner = POSES[id];
  const t = mirror ? ' transform="scale(-1,1) translate(-100,0)"' : '';
  return `<svg viewBox="0 0 100 130"><rect x="2" y="2" width="96" height="126" rx="16" fill="#0d1a09" stroke="#1a2e14" stroke-width="2"/><g${t}>${inner}</g></svg>`;
}

const DRILLS={
  quick:[
    {id:'q1',cat:'Ankle',name:'Wall Ankle Dorsiflexion Stretch',spec:'2\u00d710, hold 2s at end range, each side'},
    {id:'q2',cat:'Glutes',name:'Glute Bridge',spec:'2\u00d715'},
    {id:'q3',cat:'Hips',name:'Kneeling Hip Flexor (Couch) Stretch',spec:'2\u00d730s each side'},
    {id:'q4',cat:'Elbows',name:'Wrist Extensor Eccentric Curl',spec:'2\u00d715, light load'}
  ],
  full:[
    {id:'a1',cat:'Ankle',name:'Wall Ankle Dorsiflexion Stretch',spec:'3\u00d710, hold 2s at end range, each side'},
    {id:'a2',cat:'Ankle',name:'Standing Calf Stretch (straight knee)',spec:'2\u00d730s each side'},
    {id:'a3',cat:'Ankle',name:'Soleus Stretch (bent knee)',spec:'2\u00d730s each side'},
    {id:'a4',cat:'Ankle',name:'Ankle Circles + Alphabet',spec:'2\u00d7 each direction, each foot'},
    {id:'g1',cat:'Glutes',name:'Glute Bridge',spec:'2\u00d715'},
    {id:'g2',cat:'Glutes',name:'Single-Leg Glute Bridge',spec:'2\u00d710 each leg'},
    {id:'g3',cat:'Glutes',name:'Banded Lateral Walks (Monster Walks)',spec:'2\u00d710 steps each direction'},
    {id:'g4',cat:'Glutes',name:'Clamshells',spec:'2\u00d715 each side'},
    {id:'g5',cat:'Glutes',name:'Bird Dog',spec:'2\u00d78 each side'},
    {id:'h1',cat:'Hips',name:'Kneeling Hip Flexor (Couch) Stretch',spec:'2\u00d730-45s each side'},
    {id:'h2',cat:'Hips',name:'90/90 Hip Switch',spec:'2\u00d730s each side'},
    {id:'h3',cat:'Hips',name:'Dead Bug',spec:'2\u00d710 each side'},
    {id:'h4',cat:'Hips',name:'Standing Quad Stretch',spec:'2\u00d720s each side'},
    {id:'e1',cat:'Elbows',name:'Wrist Extensor Eccentric Curl',spec:'2\u00d715, light load'},
    {id:'e2',cat:'Elbows',name:'Wrist Flexor Stretch',spec:'2\u00d720s each arm'},
    {id:'e3',cat:'Elbows',name:'Wrist Extensor Stretch',spec:'2\u00d720s each arm'},
    {id:'e4',cat:'Elbows',name:'Band Pull-Aparts',spec:'2\u00d715'}
  ]
};

function load(){
  try{ const d=localStorage.getItem(KEY); return d?JSON.parse(d):{history:{},streak:0,bestStreak:0,totalAutoSessions:0}; }
  catch(e){ return {history:{},streak:0,bestStreak:0,totalAutoSessions:0}; }
}
function save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} }

// Writes a lightweight completion flag into the shared Health Kick hub storage ('ft6'),
// so the home page can show a mobility streak alongside the rest of the stack.
// Reads the full existing blob and only touches its own 'mobility' sub-key, so nothing
// else Health Kick/Train/Blueprint have stored there is ever overwritten.
function writeHubRecord(kind){
  try{
    const raw = localStorage.getItem('ft6');
    const hub = raw ? JSON.parse(raw) : {};
    if(!hub.mobility) hub.mobility = {};
    const d = td();
    if(!hub.mobility[d]) hub.mobility[d] = {};
    hub.mobility[d][kind] = true;
    localStorage.setItem('ft6', JSON.stringify(hub));
  }catch(e){}
}

let S = load();
let checklistMode='quick';
let mainTab='routine';

function todayEntry(){
  const d=td();
  if(!S.history[d]) S.history[d]={checked:[], autoDone:false};
  if(S.history[d].checked===undefined) S.history[d].checked=[];
  return S.history[d];
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),1600);
}

function recalcStreak(){
  let streak=0, d=new Date();
  while(true){
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const e=S.history[key];
    const quickDone = e && e.checked && DRILLS.quick.every(x=>e.checked.includes(x.id));
    const autoDone = e && e.autoDone;
    if(quickDone || autoDone){ streak++; d.setDate(d.getDate()-1); } else break;
  }
  S.streak=streak;
  if(streak>S.bestStreak) S.bestStreak=streak;
  save(S);
}

/* ---------- AUDIO ---------- */
let actx=null;
function ensureAudio(){
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
  }catch(e){}
}
function beep(freq,dur,vol,wave){
  // Re-arm on every call: phones can silently suspend the audio context mid-session
  // (screen lock, tab losing focus), so a single unlock at Start isn't reliable.
  ensureAudio();
  try{
    if(!actx) return;
    const o=actx.createOscillator(), g=actx.createGain();
    o.frequency.value=freq; o.type=wave||'sine'; g.gain.value=vol||0.35;
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur/1000);
  }catch(e){}
}
function vibrate(pattern){
  try{ if(navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}
function visualPulse(){
  const el=document.getElementById('app');
  if(!el) return;
  el.classList.add('flash-pulse');
  setTimeout(()=>el.classList.remove('flash-pulse'), 500);
}
function cueHoldDone(){ beep(880,280,0.45,'square'); vibrate([150,80,150]); visualPulse(); }
function cueHoldStart(){ beep(660,200,0.4,'sine'); vibrate(120); }
function cueRoutineDone(){ beep(1046,200,0.4,'sine'); setTimeout(()=>beep(1318,320,0.4,'sine'),180); vibrate([100,60,100,60,200]); visualPulse(); }
function testSound(){
  ensureAudio();
  beep(880,280,0.45,'square'); vibrate([150,80,150]);
  toast("Heard/felt that? If not, check your phone's media volume (not ringer) isn't muted.");
}

/* ---------- ROUTINE PLAYER ---------- */
let routineTimer=null, routineState='idle', routineIdx=-1, routineRemaining=0, routinePaused=false;

function setMainTab(t){
  mainTab=t;
  document.getElementById('tab-routine').classList.toggle('on', t==='routine');
  document.getElementById('tab-checklist').classList.toggle('on', t==='checklist');
  document.getElementById('tab-stats').classList.toggle('on', t==='stats');
  document.getElementById('view-routine').style.display = t==='routine'?'block':'none';
  document.getElementById('view-checklist').style.display = t==='checklist'?'block':'none';
  document.getElementById('view-stats').style.display = t==='stats'?'block':'none';
  if(t==='routine') renderRoutineIdle();
  if(t==='checklist') renderChecklist();
  if(t==='stats') renderStats();
}

function renderRoutineIdle(){
  if(routineState!=='idle'){ renderPlayer(); return; }
  const list=todaysRoutine();
  const totalSec = 40*list.length; // 10s intro + 30N + 10(N-1) = 40N
  const mins=Math.floor(totalSec/60), secs=totalSec%60;
  let rows='';
  list.forEach((item,i)=>{
    const meta=POSE_META[item.pose];
    rows+=`<div class="pv-row">
      <div class="pv-num">${i+1}</div>
      <div class="pv-thumb">${poseSvg(item.pose, item.side==='R')}</div>
      <div>
        <div class="pv-name">${meta.name}</div>
        <div class="pv-side">${sideLabel(item.side)} &middot; 30s</div>
      </div>
    </div>`;
  });
  document.getElementById('view-routine').innerHTML = `
    <div class="day-badge"><span class="day-num">Today's alternating focus: ${todaysFocus().alt==='glute_bridge_hold'?'Glutes':'Ankle'}</span><span class="day-lbl">+ hips &amp; wrists, every day</span></div>
    <div class="time-est">${list.length} stretches &middot; \u2248 ${mins}:${String(secs).padStart(2,'0')} total</div>
    <div class="preview-strip">${rows}</div>
    <button class="start-btn" onclick="startRoutine()">Start Routine</button>
    <button class="ctrl-btn" style="margin:10px 16px 0;width:calc(100% - 32px)" onclick="testSound()">\u{1F50A} Test Sound &amp; Vibration</button>
  `;
}

function startRoutine(){
  ensureAudio();
  routineIdx=0; routineState='getready'; routineRemaining=TRANS; routinePaused=false;
  renderPlayer();
  routineTimer=setInterval(tickRoutine,1000);
}

function tickRoutine(){
  if(routinePaused) return;
  routineRemaining--;
  if(routineRemaining<=0){
    const list=todaysRoutine();
    if(routineState==='getready'){
      routineState='hold'; routineRemaining=HOLD; cueHoldStart();
    } else if(routineState==='hold'){
      cueHoldDone();
      if(routineIdx < list.length-1){ routineState='transition'; routineRemaining=TRANS; }
      else { finishRoutine(); return; }
    } else if(routineState==='transition'){
      routineIdx++; routineState='hold'; routineRemaining=HOLD; cueHoldStart();
    }
  }
  renderPlayer();
}

function pauseToggle(){ routinePaused=!routinePaused; renderPlayer(); }
function skipPhase(){ routineRemaining=1; tickRoutine(); }
function stopRoutine(){
  clearInterval(routineTimer); routineTimer=null;
  routineState='idle'; routineIdx=-1; routinePaused=false;
  renderRoutineIdle();
}
function finishRoutine(){
  clearInterval(routineTimer); routineTimer=null;
  routineState='done';
  cueRoutineDone();
  const entry=todayEntry();
  entry.autoDone=true;
  S.totalAutoSessions=(S.totalAutoSessions||0)+1;
  save(S); recalcStreak();
  writeHubRecord('auto');
  renderPlayer();
}

function ringSvg(remaining,max,color){
  const R=92, C=2*Math.PI*R;
  const frac = max>0 ? remaining/max : 0;
  const offset = C*(1-frac);
  return `<svg viewBox="0 0 200 200">
    <circle cx="100" cy="100" r="${R}" fill="none" stroke="#142010" stroke-width="12"/>
    <circle cx="100" cy="100" r="${R}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

function renderPlayer(){
  const list=todaysRoutine();
  const wrap=document.getElementById('view-routine');
  if(routineState==='done'){
    wrap.innerHTML=`<div class="done-wrap">
      <div class="done-check">\u2713</div>
      <div class="done-title">Routine complete</div>
      <div class="done-sub">${list.length} stretches done &middot; both sides covered</div>
      <button class="start-btn" style="position:static;margin-top:24px" onclick="stopRoutine()">Back to Routine</button>
    </div>`;
    return;
  }
  if(routineState==='getready'){
    const next=list[0];
    const meta=POSE_META[next.pose];
    wrap.innerHTML=`<div class="player">
      <div class="phase-lbl getready">Get Ready \u2014 Up Next</div>
      <div class="ring-wrap">${ringSvg(routineRemaining,TRANS,'#c8a84b')}<div class="ring-num">${routineRemaining}</div></div>
      <div class="stretch-thumb">${poseSvg(next.pose, next.side==='R')}</div>
      <div class="stretch-name">${meta.name}</div>
      <div class="stretch-side">${sideLabel(next.side)}</div>
      <div class="stretch-cue">${meta.cue}</div>
      <div class="stretch-progress">Stretch 1 of ${list.length}</div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="pauseToggle()">${routinePaused?'Resume':'Pause'}</button>
        <button class="ctrl-btn" onclick="skipPhase()">Skip</button>
        <button class="ctrl-btn stop" onclick="stopRoutine()">Stop</button>
      </div>
    </div>`;
    return;
  }
  if(routineState==='hold'){
    const cur=list[routineIdx];
    const meta=POSE_META[cur.pose];
    wrap.innerHTML=`<div class="player">
      <div class="phase-lbl hold">Hold</div>
      <div class="ring-wrap">${ringSvg(routineRemaining,HOLD,'#7ed957')}<div class="ring-num">${routineRemaining}</div></div>
      <div class="stretch-thumb">${poseSvg(cur.pose, cur.side==='R')}</div>
      <div class="stretch-name">${meta.name}</div>
      <div class="stretch-side">${sideLabel(cur.side)}</div>
      <div class="stretch-cue">${meta.cue}</div>
      <div class="stretch-progress">Stretch ${routineIdx+1} of ${list.length}</div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="pauseToggle()">${routinePaused?'Resume':'Pause'}</button>
        <button class="ctrl-btn" onclick="skipPhase()">Skip</button>
        <button class="ctrl-btn stop" onclick="stopRoutine()">Stop</button>
      </div>
    </div>`;
    return;
  }
  if(routineState==='transition'){
    const next=list[routineIdx+1];
    const meta=POSE_META[next.pose];
    wrap.innerHTML=`<div class="player">
      <div class="phase-lbl getready">Change Position \u2014 Up Next</div>
      <div class="ring-wrap">${ringSvg(routineRemaining,TRANS,'#c8a84b')}<div class="ring-num">${routineRemaining}</div></div>
      <div class="stretch-thumb">${poseSvg(next.pose, next.side==='R')}</div>
      <div class="stretch-name">${meta.name}</div>
      <div class="stretch-side">${sideLabel(next.side)}</div>
      <div class="stretch-cue">${meta.cue}</div>
      <div class="stretch-progress">Stretch ${routineIdx+2} of ${list.length}</div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="pauseToggle()">${routinePaused?'Resume':'Pause'}</button>
        <button class="ctrl-btn" onclick="skipPhase()">Skip</button>
        <button class="ctrl-btn stop" onclick="stopRoutine()">Stop</button>
      </div>
    </div>`;
    return;
  }
}

/* ---------- CHECKLIST (manual) ---------- */
function setChecklistMode(m){ checklistMode=m; renderChecklist(); }

function toggleDrill(id){
  const entry=todayEntry();
  const idx=entry.checked.indexOf(id);
  if(idx>-1) entry.checked.splice(idx,1); else entry.checked.push(id);
  save(S); recalcStreak(); renderChecklist();
  const list = checklistMode==='quick' ? DRILLS.quick : DRILLS.full;
  if(idx===-1 && list.every(x=>entry.checked.includes(x.id))){
    toast(checklistMode==='quick' ? 'Quick checklist done' : 'Full checklist complete \u{1F44F}');
    writeHubRecord(checklistMode);
  }
}

function renderChecklist(){
  const list = checklistMode==='quick' ? DRILLS.quick : DRILLS.full;
  const entry=todayEntry();
  const done = list.filter(x=>entry.checked.includes(x.id)).length;
  const cats=[...new Set(list.map(x=>x.cat))];
  let html = `<div class="pill-toggle">
    <button class="pill ${checklistMode==='quick'?'on':''}" onclick="setChecklistMode('quick')">Quick</button>
    <button class="pill ${checklistMode==='full'?'on':''}" onclick="setChecklistMode('full')">Full</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-top"><div class="progress-lbl">Today's checklist</div><div class="progress-frac">${done}/${list.length}</div></div>
    <div class="progress-track"><div class="progress-fill" style="width:${list.length?done/list.length*100:0}%"></div></div>
  </div>`;
  for(const cat of cats){
    html+=`<div class="sec">${cat}</div>`;
    for(const dr of list.filter(x=>x.cat===cat)){
      const isDone=entry.checked.includes(dr.id);
      html+=`<div class="drill ${isDone?'done':''}" onclick="toggleDrill('${dr.id}')">
        <div class="d-check ${isDone?'done':''}"></div>
        <div class="d-body"><div class="d-name ${isDone?'done':''}">${dr.name}</div><div class="d-spec">${dr.spec}</div></div>
      </div>`;
    }
  }
  html+=`<div class="note-box">General mobility work \u2014 ease off anything that sharpens pain, especially the ankle and elbow drills, and check with a physio if something doesn't settle.</div>`;
  html+=`<div class="reset-btn"><button onclick="resetToday()">Reset today's checks</button></div>`;
  document.getElementById('view-checklist').innerHTML=html;
}

function resetToday(){
  const entry=todayEntry();
  entry.checked=[];
  save(S); recalcStreak(); renderChecklist();
}

/* ---------- STATS ---------- */
function renderStats(){
  let totalQuick=0, totalFull=0;
  for(const d of Object.keys(S.history)){
    const e=S.history[d];
    if(e.checked && DRILLS.quick.every(x=>e.checked.includes(x.id))) totalQuick++;
    if(e.checked && DRILLS.full.every(x=>e.checked.includes(x.id))) totalFull++;
  }
  const dow=['S','M','T','W','T','F','S'];
  let strip='';
  for(let i=6;i>=0;i--){
    const dd=new Date(); dd.setDate(dd.getDate()-i);
    const key=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
    const e=S.history[key];
    const hit = e && ((e.checked && DRILLS.quick.every(x=>e.checked.includes(x.id))) || e.autoDone);
    strip+=`<div class="week-day ${hit?'hit':''} ${i===0?'today':''}">${dow[dd.getDay()]}</div>`;
  }
  document.getElementById('view-stats').innerHTML=`
    <div class="streak-row">
      <div class="streak-badge"><div class="streak-num">${S.streak}</div><div class="streak-lbl">Day Streak</div></div>
      <div class="streak-badge"><div class="streak-num">${S.bestStreak}</div><div class="streak-lbl">Best Streak</div></div>
    </div>
    <div class="stats-card"><div class="stats-title">This week</div><div class="week-strip">${strip}</div></div>
    <div class="stats-card">
      <div class="stats-title">All-time</div>
      <div class="stats-grid">
        <div class="stat-cell"><div class="stat-num">${S.totalAutoSessions||0}</div><div class="stat-lbl">Auto routines</div></div>
        <div class="stat-cell"><div class="stat-num">${totalQuick}</div><div class="stat-lbl">Quick checklists</div></div>
        <div class="stat-cell"><div class="stat-num">${totalFull}</div><div class="stat-lbl">Full checklists</div></div>
        <div class="stat-cell"><div class="stat-num">${S.streak}</div><div class="stat-lbl">Current streak</div></div>
      </div>
    </div>`;
}

recalcStreak();
renderRoutineIdle();
</script>
</body>
</html>
