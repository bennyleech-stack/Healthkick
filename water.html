<title>Hydration · Health Kick</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090c;--bg2:#0e1017;--bg3:#141720;--card:#10121a;
  --border:#1e2230;--border2:#272b3a;
  --blue:#4da6ff;--blue-d:rgba(77,166,255,.1);
  --green:#3dd68c;--green-d:rgba(61,214,140,.1);
  --text:#eef0f6;--text2:#7a8099;--text3:#3d4258;
  --r:18px;--rs:12px;
}
html,body{position:fixed;inset:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;width:100%}
#app{display:flex;flex-direction:column;position:fixed;inset:0;max-width:390px;margin:0 auto;width:100%;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}

/* HEADER */
.hdr{padding:32px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.hdr-title{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-.5px}
.hdr-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);margin-top:3px}
.hk-link{font-size:10px;color:var(--text3);text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif}

/* MAIN RING */
.ring-wrap{display:flex;flex-direction:column;align-items:center;padding:28px 24px 20px;flex:1;justify-content:center}
.ring-outer{position:relative;width:220px;height:220px;margin-bottom:24px}
.ring-outer svg{transform:rotate(-90deg);width:220px;height:220px}
.ring-track{fill:none;stroke:var(--border);stroke-width:14;stroke-linecap:round}
.ring-fill{fill:none;stroke:var(--blue);stroke-width:14;stroke-linecap:round;stroke-dasharray:628;stroke-dashoffset:628;transition:stroke-dashoffset .6s cubic-bezier(.34,1.56,.64,1),stroke .4s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-ml{font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:500;color:var(--text);line-height:1}
.ring-unit{font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600}
.ring-goal{font-size:11px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace}

/* STATUS */
.status{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:4px;text-align:center}
.status-bar{width:100%;max-width:280px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:24px}
.status-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}

/* QUICK ADD BUTTONS */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:340px;margin-bottom:16px}
.qbtn{
  background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:14px 8px;text-align:center;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;color:var(--blue);
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.qbtn:active{background:var(--bg3);transform:scale(.94);}
.qbtn span{font-size:18px;}
.qbtn-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700}

/* BOTTOM ACTIONS */
.actions{display:flex;gap:10px;width:100%;max-width:340px;margin-bottom:12px}
.act-btn{
  flex:1;padding:13px;border-radius:var(--rs);border:1px solid var(--border2);
  background:var(--card);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;
}
.act-btn:active{background:var(--bg3);}
.act-btn.primary{background:var(--blue);color:#08090c;border-color:var(--blue);box-shadow:0 0 20px rgba(77,166,255,.25);}

/* CUSTOM INPUT */
.custom-row{display:none;width:100%;max-width:340px;gap:10px;margin-bottom:12px}
.custom-row.show{display:flex}
.custom-input{
  flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);
  padding:13px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:18px;
  outline:none;text-align:center;
  transition:border-color .15s, box-shadow .15s;
}
.custom-input:focus{border-color:rgba(77,166,255,.4);box-shadow:0 0 0 3px rgba(77,166,255,.08);}

/* LOG */
.log-section{width:100%;max-width:340px;max-height:120px;overflow-y:auto;padding-bottom:8px}
.log-section::-webkit-scrollbar{display:none}
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.log-entry:last-child{border-bottom:none}
.log-ml{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue)}
.log-time{font-size:10px;color:var(--text3)}

/* TOAST */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);
  background:var(--card);color:var(--text);border:1px solid var(--border2);
  padding:9px 18px;border-radius:24px;font-size:13px;font-weight:600;
  z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,.6);white-space:nowrap;
}
.toast.on{transform:translateX(-50%) translateY(0);}

/* GOAL ACHIEVED */
.achieved{
  display:none;position:fixed;inset:0;background:rgba(8,9,12,.92);
  align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:12px;
}
.achieved.show{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.achieved-icon{font-size:72px;animation:bounce .6s ease}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.achieved-text{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--blue);text-align:center}
.achieved-sub{font-size:14px;color:var(--text2);text-align:center}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-title" style="color:var(--blue)">💧 Hydration</div>
      <div class="hdr-date" id="w-date"></div>
    </div>
    <a href="index.html" class="hk-link">Health Kick →</a>
  </div>

  <div class="ring-wrap">
    <div class="ring-outer">
      <svg viewBox="0 0 220 220">
        <circle class="ring-track" cx="110" cy="110" r="100"/>
        <circle class="ring-fill" id="ring" cx="110" cy="110" r="100"/>
      </svg>
      <div class="ring-center">
        <div class="ring-ml" id="w-total">0</div>
        <div class="ring-unit">ml today</div>
        <div class="ring-goal" id="w-goal-label"></div>
      </div>
    </div>

    <div class="status" id="w-status">Start logging your water</div>
    <div class="status-bar"><div class="status-fill" id="w-bar" style="width:0%"></div></div>

    <div class="quick-grid">
      <div class="qbtn" onclick="addWater(150)"><span>☕</span><div>150ml</div><div class="qbtn-label">Coffee</div></div>
      <div class="qbtn" onclick="addWater(250)"><span>🥤</span><div>250ml</div><div class="qbtn-label">Glass</div></div>
      <div class="qbtn" onclick="addWater(500)"><span>🍶</span><div>500ml</div><div class="qbtn-label">Bottle</div></div>
      <div class="qbtn" onclick="addWater(750)"><span>🫙</span><div>750ml</div><div class="qbtn-label">Large</div></div>
    </div>

    <div class="actions">
      <button class="act-btn" onclick="toggleCustom()">+ Custom</button>
      <button class="act-btn" onclick="resetWater()">Reset</button>
    </div>

    <div class="custom-row" id="custom-row">
      <input class="custom-input" type="number" id="custom-ml" placeholder="ml" min="1" max="2000" inputmode="numeric">
      <button class="act-btn primary" onclick="addCustom()">Add</button>
    </div>

    <div class="log-section" id="w-log"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="achieved" id="achieved" onclick="this.classList.remove('show')">
  <div class="achieved-icon">💧</div>
  <div class="achieved-text">Goal Reached!</div>
  <div class="achieved-sub" id="achieved-sub"></div>
  <div style="font-size:11px;color:var(--text3);margin-top:8px">Tap to dismiss</div>
</div>

<script>
// ── Shared localStorage key with Health Kick ─────────────────────────────────
const STORAGE_KEY='ft6';
let _goalShown=false;

function td(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}

function loadState(){
  try{const d=localStorage.getItem(STORAGE_KEY);return d?JSON.parse(d):{};}
  catch(e){return{};}
}

function saveWater(ml){
  try{
    const state=loadState();
    if(!state.water)state.water={};
    state.water[td()]=ml;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  }catch(e){toast('Storage error');}
}

function getGoal(){
  const state=loadState();
  return(state.goals&&state.goals.water)||2000;
}

function getToday(){
  const state=loadState();
  return(state.water&&state.water[td()])||0;
}

function getLog(){
  // We store just the daily total in Health Kick, not individual entries
  // For display purposes, track entries in sessionStorage for this session
  try{const d=sessionStorage.getItem('wlog');return d?JSON.parse(d):[];}
  catch(e){return[];}
}
function addToLog(ml){
  const log=getLog();
  const now=new Date();
  log.push({ml,time:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')});
  try{sessionStorage.setItem('wlog',JSON.stringify(log));}catch(e){}
}
function clearLog(){try{sessionStorage.removeItem('wlog');}catch(e){}}

function render(){
  const total=getToday();
  const goal=getGoal();
  const pct=Math.min(1,total/goal);
  const circumference=628;

  // Ring
  const ring=document.getElementById('ring');
  ring.style.strokeDashoffset=circumference*(1-pct);
  ring.style.stroke=pct>=1?'var(--green)':'var(--blue)';

  // Numbers
  document.getElementById('w-total').textContent=total;
  document.getElementById('w-goal-label').textContent='/ '+goal+'ml goal';

  // Progress bar
  const bar=document.getElementById('w-bar');
  bar.style.width=Math.min(100,Math.round(pct*100))+'%';
  bar.style.background=pct>=1?'var(--green)':'var(--blue)';

  // Status message
  const rem=goal-total;
  const statusEl=document.getElementById('w-status');
  if(pct>=1){statusEl.textContent='✅ Daily goal achieved!';}
  else if(total===0){statusEl.textContent='Start logging your water';}
  else if(rem>0){statusEl.textContent=rem+'ml to reach your goal';}

  // Log entries
  const log=getLog();
  const logEl=document.getElementById('w-log');
  logEl.innerHTML=log.length?
    [...log].reverse().map(e=>`<div class="log-entry"><span class="log-ml">+${e.ml}ml</span><span class="log-time">${e.time}</span></div>`).join(''):
    '<div style="font-size:11px;color:var(--text3);padding:8px 0;text-align:center">No entries yet today</div>';

  // Date
  const now=new Date();
  document.getElementById('w-date').textContent=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
}

function addWater(ml){
  const prev=getToday();
  const newTotal=prev+ml;
  const goal=getGoal();
  saveWater(newTotal);
  addToLog(ml);
  render();
  toast('+'+ml+'ml added');
  // Goal celebration
  if(!_goalShown&&newTotal>=goal&&prev<goal){
    _goalShown=true;
    const el=document.getElementById('achieved');
    document.getElementById('achieved-sub').textContent='You hit '+newTotal+'ml — goal was '+goal+'ml';
    el.classList.add('show');
  }
}

function addCustom(){
  const v=parseInt(document.getElementById('custom-ml').value);
  if(!v||v<1){toast('Enter a valid amount');return;}
  addWater(v);
  document.getElementById('custom-ml').value='';
  toggleCustom();
}

function toggleCustom(){
  const row=document.getElementById('custom-row');
  const showing=row.classList.contains('show');
  row.classList.toggle('show');
  if(!showing)setTimeout(()=>document.getElementById('custom-ml').focus(),100);
}

function resetWater(){
  if(!confirm('Reset today\'s water to 0?'))return;
  saveWater(0);clearLog();_goalShown=false;render();toast('Reset ✓');
}

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2000);
}

// Re-render when focus returns (e.g. switching from Health Kick)
window.addEventListener('focus',render);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)render();});

render();
</script>
</body>
</html>
