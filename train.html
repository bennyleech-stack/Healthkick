<title>Train</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080c0a;--bg2:#0d120f;--bg3:#121a14;--card:#101510;--card2:#161e16;
  --border:#1e2a1e;--border2:#263326;
  --accent:#3dd68c;--accent-d:rgba(61,214,140,.1);--accent-glow:rgba(61,214,140,.2);
  --yellow:#ffc247;--yellow-d:rgba(255,194,71,.1);
  --blue:#4da6ff;--orange:#ff7c3f;--red:#ff5252;--purple:#a78bfa;
  --text:#e8f0e8;--text2:#7a8f7a;--text3:#354035;
  --r:16px;--rs:11px;--rm:22px;
}
html,body{position:fixed;inset:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;width:100%}
#app{display:flex;flex-direction:column;position:fixed;inset:0;max-width:430px;margin:0 auto;width:100%}
/* HEADER */
.hdr{padding:26px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.hdr-eyebrow{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.hdr-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1;color:var(--text)}
.hub-link{font-size:10px;color:var(--text3);text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-weight:600;white-space:nowrap}
/* VIEWS */
#view-list{display:flex;flex-direction:column;flex:1;overflow:hidden}
#view-new{display:none;flex-direction:column;flex:1;overflow:hidden}
#view-repeat{display:none;flex-direction:column;flex:1;overflow:hidden}
/* TABS */
.tabs{display:flex;gap:0;margin:14px 16px 0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:3px;flex-shrink:0}
.tab{flex:1;padding:9px 4px;text-align:center;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;color:var(--text3);border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif}
.tab.on{background:var(--card2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.4)}
/* SCROLL */
#wlist-scroll{flex:1;overflow-y:auto;padding-bottom:24px}
#wlist-scroll::-webkit-scrollbar{display:none}
#new-scroll{flex:1;overflow-y:auto;padding:0 16px 24px}
#new-scroll::-webkit-scrollbar{display:none}
#repeat-scroll{flex:1;overflow-y:auto;padding:0 16px 24px}
#repeat-scroll::-webkit-scrollbar{display:none}
/* ACTION BAR */
.action-bar{padding:10px 16px calc(10px + env(safe-area-inset-bottom));flex-shrink:0;display:flex;gap:8px;background:rgba(8,12,10,.97);border-top:1px solid var(--border);backdrop-filter:blur(20px)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:var(--rs);border:none;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:var(--accent);color:#080c0a;box-shadow:0 0 20px var(--accent-glow)}
.btn-p:active{opacity:.85;transform:scale(.97)}
.btn-g{background:var(--card2);color:var(--text2);border:1px solid var(--border2)}
.btn-g:active{background:var(--bg3)}
.btn-fw{width:100%}
/* WORKOUT CARDS */
.wi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:8px 16px 0;cursor:pointer;transition:all .18s}
.wi:active{border-color:var(--border2);transform:scale(.99)}
.wn{font-size:14px;font-weight:700;color:var(--text)}
.wm{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.wr{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.wc{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:10px;color:var(--text3);font-weight:500}
.wc.pr{border-color:rgba(255,194,71,.3);color:var(--yellow)}
/* SECTION LABEL */
.sec{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.4px;padding:16px 16px 8px;font-weight:700}
/* EXERCISE BUILDER */
.eb{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:13px;margin-bottom:10px}
.exh{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.exh input{flex:1;background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;outline:none}
.exh input:focus{border-color:rgba(61,214,140,.35)}
.ex-del{background:none;border:1px solid var(--border2);color:var(--text3);border-radius:7px;padding:6px 10px;font-size:12px;cursor:pointer}
.set-table{width:100%;border-collapse:collapse}
.set-table th{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;text-align:center;padding:4px 2px;font-weight:700}
.set-table td{text-align:center;padding:3px 2px}
.set-row{border-top:1px solid var(--border)}
.set-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);width:20px}
.set-inp{width:100%;background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:8px 4px;font-size:13px;font-family:'JetBrains Mono',monospace;text-align:center;color:var(--text);outline:none}
.set-inp:focus{border-color:rgba(61,214,140,.35)}
.set-del{background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer;padding:0}
.set-prev{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:center}
.add-set{width:100%;margin-top:8px;padding:8px;border-radius:7px;background:none;border:1px dashed var(--border2);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
.add-set:active{background:var(--bg3)}
/* FORM INPUTS */
.ig{margin-bottom:13px}
.ig label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.ig input,.ig select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rs);padding:12px 13px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.ig input:focus,.ig select:focus{border-color:rgba(61,214,140,.35)}
/* SUMMARY MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(16px);z-index:200;display:none;align-items:flex-end}
.overlay.show{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);border:1px solid var(--border);border-top-left-radius:var(--rm);border-top-right-radius:var(--rm);border-bottom:none;padding:0 20px calc(28px + env(safe-area-inset-bottom));width:100%;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.show .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:16px auto 18px}
.sh-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.sh-sub{font-size:11px;color:var(--text3);margin-bottom:16px}
.sh-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sh-stat{background:var(--bg3);border-radius:10px;padding:13px;text-align:center}
.sh-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;line-height:1}
.sh-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-top:4px;font-weight:700}
.sh-prs{margin-bottom:14px}
.sh-pr-hdr{font-size:10px;color:var(--yellow);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:700}
.sh-pr-item{font-size:12px;color:var(--text2);margin-bottom:4px}
/* TEMPLATE LIST */
.tpl{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.tpl-name{font-size:13px;font-weight:600;color:var(--text)}
.tpl-meta{font-size:10px;color:var(--text3);margin-top:2px}
.tpl-btns{display:flex;gap:7px;margin-top:10px}
/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--card2);color:var(--text);border:1px solid var(--border2);padding:9px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.7);white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.em{text-align:center;padding:40px 20px}
.ei{font-size:36px;opacity:.15;margin-bottom:9px}
.em p{font-size:13px;color:var(--text3);font-weight:500}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-eyebrow">Health Kick</div>
      <div class="hdr-title">&#x1F3CB;&#xFE0F; Train</div>
    </div>
    <a href="index.html" class="hub-link">&#8592; Hub</a>
  </div>

  <!-- LIST VIEW -->
  <div id="view-list">
    <div class="tabs">
      <button class="tab on" id="tab-workouts" onclick="showTab('workouts')">Workouts</button>
      <button class="tab" id="tab-templates" onclick="showTab('templates')">Templates</button>
    </div>
    <div id="wlist-scroll">
      <div id="wlist-inner"></div>
      <div id="tpl-inner" style="display:none;padding:8px 16px 0"></div>
    </div>
    <div class="action-bar">
      <button class="btn btn-g" onclick="openTemplateList()" style="padding:12px 14px">&#x1F4CB;</button>
      <button class="btn btn-p btn-fw" onclick="startNew()">+ New Workout</button>
    </div>
  </div>

  <!-- NEW/EDIT WORKOUT VIEW -->
  <div id="view-new">
    <div style="padding:14px 16px 0;flex-shrink:0;display:flex;align-items:center;gap:10px">
      <button onclick="cancelNew()" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0;line-height:1">&#8592;</button>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800" id="new-title">New Workout</div>
    </div>
    <div id="new-scroll">
      <div style="margin-top:14px">
        <div class="ig"><label>Workout Name</label><input id="wn" placeholder="Push Day, Leg Day&#x2026;"></div>
        <div class="ig"><label>Date</label><input type="date" id="wd"></div>
      </div>
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:4px 0 10px;font-weight:700">Exercises</div>
      <div id="exc"></div>
      <button onclick="addExercise()" style="width:100%;padding:12px;border-radius:var(--rs);border:1px dashed var(--border2);background:none;color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-bottom:4px">+ Add Exercise</button>
    </div>
    <div class="action-bar">
      <button class="btn btn-g" onclick="cancelNew()">Cancel</button>
      <button class="btn btn-p btn-fw" onclick="saveWorkout()">Save Workout</button>
    </div>
  </div>

  <!-- REPEAT + UPDATE VIEW -->
  <div id="view-repeat">
    <div style="padding:14px 16px 0;flex-shrink:0;display:flex;align-items:center;gap:10px">
      <button onclick="cancelRepeat()" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0;line-height:1">&#8592;</button>
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800" id="repeat-title">Repeat Workout</div>
    </div>
    <div style="padding:4px 16px 0;font-size:11px;color:var(--text3);flex-shrink:0">Previous weights shown. Update as needed.</div>
    <div id="repeat-scroll">
      <div style="margin-top:12px">
        <div class="ig"><label>Date</label><input type="date" id="rd"></div>
      </div>
      <div id="rb2"></div>
    </div>
    <div class="action-bar">
      <button class="btn btn-g" onclick="cancelRepeat()">Cancel</button>
      <button class="btn btn-p btn-fw" onclick="saveRepeat()">Save</button>
    </div>
  </div>
</div>

<!-- WORKOUT SUMMARY -->
<div class="overlay" id="summary-overlay" onclick="if(event.target===this)closeSummary()">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div style="font-size:28px;margin-bottom:8px;text-align:center">&#x1F4AA;</div>
    <div class="sh-title" id="sum-name"></div>
    <div class="sh-sub">Workout saved &#x2713;</div>
    <div class="sh-stats">
      <div class="sh-stat"><div class="sh-val" id="sum-sets" style="color:var(--accent)"></div><div class="sh-lbl">Total Sets</div></div>
      <div class="sh-stat"><div class="sh-val" id="sum-vol" style="color:var(--blue)"></div><div class="sh-lbl">Volume kg</div></div>
    </div>
    <div class="sh-prs" id="sum-prs" style="display:none">
      <div class="sh-pr-hdr">&#x1F3C6; Personal Records</div>
      <div id="sum-prs-list"></div>
    </div>
    <button onclick="closeSummary()" style="width:100%;padding:14px;border-radius:var(--rs);background:var(--accent);color:#080c0a;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 0 20px var(--accent-glow)">Done</button>
  </div>
</div>

<!-- VIEW PAST WORKOUT -->
<div class="overlay" id="view-overlay" onclick="if(event.target===this)closeView()">
  <div class="sheet" style="max-height:88dvh;overflow-y:auto">
    <div class="sh-handle"></div>
    <div class="sh-title" id="vw-name"></div>
    <div class="sh-sub" id="vw-date"></div>
    <div id="vw-body" style="margin-bottom:14px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <button onclick="closeView()" class="btn btn-g btn-fw">Close</button>
      <button onclick="repeatWorkout()" class="btn btn-p btn-fw">Repeat + Update</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button onclick="editWorkout()" class="btn btn-g btn-fw">&#x270F; Edit</button>
      <button onclick="saveTemplate()" class="btn btn-g btn-fw">&#x1F4CB; Template</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='ft6';
let _vid=null,_editId=null,_ec=0,_tab='workouts';

// ── Storage ───────────────────────────────────────────────────
function load(){try{const d=localStorage.getItem(KEY);return d?JSON.parse(d):{workouts:[],templates:[]};}catch(e){return{workouts:[],templates:[]};}}
function save(s){try{const{dd:_a,cm:_b,...c}=s;localStorage.setItem(KEY,JSON.stringify(c));}catch(e){toast('Storage error');}}
function td(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function fd(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}

// ── PR system (Epley e1RM) ────────────────────────────────────
function get1RM(w,r){if(r===1)return w;return Math.round(w*(1+r/30));}
function getPRs(){
  const s=load(),prs={};
  [...(s.workouts||[])].sort((a,b)=>a.date.localeCompare(b.date)).forEach(w=>{
    (w.exercises||[]).forEach(ex=>{
      (ex.sets||[]).forEach(s=>{
        if(!s.weight||!s.reps)return;
        const e=get1RM(s.weight,s.reps);
        if(!prs[ex.name]||e>prs[ex.name].e1rm)
          prs[ex.name]={weight:s.weight,reps:s.reps,e1rm:e,workoutId:w.id,date:w.date};
      });
    });
  });
  return prs;
}
function checkPRs(exercises,before){
  const newPRs=[];
  exercises.forEach(ex=>{
    const best=ex.sets.filter(s=>s.weight&&s.reps).reduce((b,s)=>get1RM(s.weight,s.reps)>get1RM(b.weight||0,b.reps||0)?s:b,{weight:0,reps:0});
    if(!best.weight)return;
    const ne=get1RM(best.weight,best.reps);
    const prev=before[ex.name];
    if(!prev||ne>prev.e1rm)newPRs.push({name:ex.name,w:best.weight,r:best.reps,e1rm:ne,prev:prev?prev.e1rm:null,imp:prev?Math.round(ne-prev.e1rm):null});
  });
  return newPRs;
}

// ── Views ─────────────────────────────────────────────────────
function show(id){['view-list','view-new','view-repeat'].forEach(v=>document.getElementById(v).style.display='none');document.getElementById(id).style.display='flex';}
function showTab(t){
  _tab=t;
  document.getElementById('tab-workouts').classList.toggle('on',t==='workouts');
  document.getElementById('tab-templates').classList.toggle('on',t==='templates');
  document.getElementById('wlist-inner').style.display=t==='workouts'?'block':'none';
  document.getElementById('tpl-inner').style.display=t==='templates'?'block':'none';
  if(t==='templates')renderTemplates();
}

// ── Workout list ──────────────────────────────────────────────
function renderList(){
  const s=load();
  const items=(s.workouts||[]).filter(w=>w.type==='strength'||!w.type);
  const el=document.getElementById('wlist-inner');
  if(!items.length){el.innerHTML='<div class="em"><div class="ei">&#x1F3CB;</div><p>No workouts yet. Tap New Workout to start.</p></div>';return;}
  const prs=getPRs();
  el.innerHTML=items.map(w=>{
    const wPRs=(w.exercises||[]).filter(ex=>prs[ex.name]&&prs[ex.name].workoutId===w.id);
    const sets=(w.exercises||[]).reduce((a,e)=>a+(e.sets||[]).length,0);
    const vol=Math.round((w.exercises||[]).reduce((a,e)=>a+(e.sets||[]).reduce((b,s)=>b+(s.weight||0)*(s.reps||0),0),0));
    return`<div class="wi" onclick="openView(${w.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="wn">${w.name}${wPRs.length?` <span style="font-size:11px;color:var(--yellow)">&#x1F3C6;</span>`:''}</div>
          <div class="wm">${fd(w.date)} &middot; ${(w.exercises||[]).length} exercises &middot; ${sets} sets</div>
        </div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);flex-shrink:0;margin-left:8px;text-align:right">${vol?vol.toLocaleString()+'kg':''}</div>
      </div>
      <div class="wr">${(w.exercises||[]).map(e=>{const pr=prs[e.name];const isPR=pr&&pr.workoutId===w.id;return`<span class="wc${isPR?' pr':''}">${e.name}${isPR?' &#x1F3C6;':''}</span>`;}).join('')}</div>
    </div>`;
  }).join('');
}

// ── Templates ─────────────────────────────────────────────────
function renderTemplates(){
  const s=load();
  const el=document.getElementById('tpl-inner');
  if(!(s.templates||[]).length){el.innerHTML='<div class="em"><div class="ei">&#x1F4CB;</div><p>No templates yet.<br>Open a past workout and tap Template.</p></div>';return;}
  el.innerHTML=(s.templates||[]).map(t=>`
    <div class="tpl">
      <div class="tpl-name">${t.name}</div>
      <div class="tpl-meta">${t.exercises.length} exercises &middot; ${t.exercises.reduce((a,e)=>a+e.sets.length,0)} sets</div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px">${t.exercises.map(e=>e.name).join(', ')}</div>
      <div class="tpl-btns">
        <button onclick="startFromTemplate(${t.id})" class="btn btn-p" style="flex:1;padding:9px">Start Session</button>
        <button onclick="delTemplate(${t.id})" class="btn btn-g" style="padding:9px 12px;color:var(--red)">&#x1F5D1;</button>
      </div>
    </div>`).join('');
}
function openTemplateList(){showTab('templates');}
function startFromTemplate(id){
  const s=load();
  const t=(s.templates||[]).find(x=>x.id===id);if(!t)return;
  _editId=null;_ec=0;
  document.getElementById('new-title').textContent=t.name;
  document.getElementById('wn').value=t.name;
  document.getElementById('wd').value=td();
  document.getElementById('exc').innerHTML='';
  t.exercises.forEach(e=>addExercise(e));
  show('view-new');
}
function delTemplate(id){
  const s=load();
  s.templates=(s.templates||[]).filter(t=>t.id!==id);
  save(s);renderTemplates();toast('Template deleted');
}

// ── New workout ───────────────────────────────────────────────
function startNew(){
  _editId=null;_ec=0;
  document.getElementById('new-title').textContent='New Workout';
  document.getElementById('wn').value='';
  document.getElementById('wd').value=td();
  document.getElementById('exc').innerHTML='';
  addExercise();addExercise();
  show('view-new');
}
function cancelNew(){show('view-list');renderList();}

function addExercise(pre=null){
  const id=_ec++;
  const el=document.createElement('div');
  el.className='eb';el.id='ex-'+id;
  el.innerHTML=`
    <div class="exh">
      <input type="text" placeholder="Exercise name" id="en-${id}" value="${pre?pre.name:''}" autocomplete="off">
      <button class="ex-del" onclick="document.getElementById('ex-${id}').remove()">&#x2715;</button>
    </div>
    <table class="set-table" width="100%">
      <thead><tr><th style="width:22px">#</th><th>kg</th><th>Reps</th><th style="width:24px"></th></tr></thead>
      <tbody id="sb-${id}"></tbody>
    </table>
    <button class="add-set" onclick="addSet(${id})">+ Set</button>`;
  document.getElementById('exc').appendChild(el);
  if(pre&&pre.sets&&pre.sets.length)pre.sets.forEach(s=>addSet(id,s));
  else{addSet(id);addSet(id);addSet(id);}
}

function addSet(eid,pre=null){
  const tb=document.getElementById('sb-'+eid);if(!tb)return;
  const n=tb.querySelectorAll('tr').length+1;
  const tr=document.createElement('tr');tr.className='set-row';
  tr.innerHTML=`<td class="set-num">${n}</td>
    <td><input class="set-inp" type="number" placeholder="&#x2014;" step="0.5" value="${pre?.weight||''}" inputmode="decimal"></td>
    <td><input class="set-inp" type="number" placeholder="&#x2014;" value="${pre?.reps||''}" inputmode="numeric"></td>
    <td><button class="set-del" onclick="this.closest('tr').remove()">&#x2715;</button></td>`;
  tb.appendChild(tr);
  // Auto-focus the weight field of new set if adding manually
  if(!pre)setTimeout(()=>tr.querySelector('input[type="number"]').focus(),50);
}

function getExercises(containerId){
  const exs=[];
  document.querySelectorAll('#'+containerId+' .eb').forEach(b=>{
    const m=b.id.match(/ex-(\d+)/);if(!m)return;
    const id=m[1];const name=document.getElementById('en-'+id)?.value.trim();if(!name)return;
    const sets=[];
    b.querySelectorAll('.set-row').forEach(r=>{
      const ins=r.querySelectorAll('input[type="number"]');
      if(ins.length>=2)sets.push({weight:parseFloat(ins[0].value)||0,reps:parseInt(ins[1].value)||0});
    });
    if(sets.length)exs.push({name,sets});
  });
  return exs;
}

function saveWorkout(){
  const name=document.getElementById('wn').value.trim();
  const date=document.getElementById('wd').value||td();
  if(!name){toast('Enter a workout name');return;}
  const exercises=getExercises('exc');
  if(!exercises.length){toast('Add at least one exercise');return;}
  const s=load();
  if(!s.workouts)s.workouts=[];
  const prsBefore=getPRs();
  if(_editId){
    const idx=s.workouts.findIndex(w=>w.id===_editId);
    if(idx>-1)s.workouts[idx]={...s.workouts[idx],name,date,exercises};
    _editId=null;
    save(s);show('view-list');renderList();toast('Workout updated');
  } else {
    const newId=Date.now();
    s.workouts.unshift({id:newId,name,date,exercises,type:'strength'});
    save(s);
    const newPRs=checkPRs(exercises,prsBefore);
    show('view-list');renderList();
    showSummary(name,exercises,newPRs);
  }
}

// ── Summary modal ─────────────────────────────────────────────
function showSummary(name,exercises,prs){
  const sets=exercises.reduce((a,e)=>a+e.sets.length,0);
  const vol=Math.round(exercises.reduce((a,e)=>a+e.sets.reduce((b,s)=>b+(s.weight||0)*(s.reps||0),0),0));
  document.getElementById('sum-name').textContent=name;
  document.getElementById('sum-sets').textContent=sets;
  document.getElementById('sum-vol').textContent=vol.toLocaleString();
  const prsEl=document.getElementById('sum-prs');
  const prsList=document.getElementById('sum-prs-list');
  if(prs.length){
    prsEl.style.display='block';
    prsList.innerHTML=prs.map(p=>`<div class="sh-pr-item"><strong>${p.name}</strong>: ${p.w}kg &times; ${p.r} &nbsp;<span style="font-family:'JetBrains Mono',monospace;color:var(--yellow)">~${p.e1rm}kg e1RM</span>${p.imp?` <span style="font-size:10px;color:var(--accent)">(+${p.imp}kg)</span>`:''}</div>`).join('');
  } else {
    prsEl.style.display='none';
  }
  document.getElementById('summary-overlay').classList.add('show');
}
function closeSummary(){document.getElementById('summary-overlay').classList.remove('show');}

// ── View past workout ─────────────────────────────────────────
function openView(id){
  const s=load();
  const w=(s.workouts||[]).find(x=>x.id===id);if(!w)return;
  _vid=id;
  document.getElementById('vw-name').textContent=w.name;
  document.getElementById('vw-date').textContent=fd(w.date);
  const prs=getPRs();
  document.getElementById('vw-body').innerHTML=(w.exercises||[]).map(e=>{
    const pr=prs[e.name];
    return`<div class="eb" style="margin-bottom:10px">
      <div style="font-weight:700;font-size:14px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center">
        <span>${e.name}</span>
        ${pr&&pr.workoutId===w.id?`<span style="font-size:10px;color:var(--yellow)">&#x1F3C6; PR ~${pr.e1rm}kg</span>`:''}
      </div>
      <table class="set-table" width="100%">
        <thead><tr><th>#</th><th>Weight</th><th>Reps</th><th>Vol</th></tr></thead>
        <tbody>${(e.sets||[]).map((s,i)=>`<tr class="set-row">
          <td class="set-num">${i+1}</td>
          <td style="font-family:'JetBrains Mono',monospace;text-align:center;color:var(--text)">${s.weight}kg</td>
          <td style="font-family:'JetBrains Mono',monospace;text-align:center;color:var(--text)">${s.reps}</td>
          <td style="font-family:'JetBrains Mono',monospace;text-align:center;color:var(--text3)">${Math.round(s.weight*s.reps)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }).join('');
  document.getElementById('view-overlay').classList.add('show');
}
function closeView(){document.getElementById('view-overlay').classList.remove('show');_vid=null;}

function editWorkout(){
  const s=load();
  const w=(s.workouts||[]).find(x=>x.id===_vid);if(!w)return;
  closeView();_editId=w.id;_ec=0;
  document.getElementById('new-title').textContent='Edit Workout';
  document.getElementById('wn').value=w.name;
  document.getElementById('wd').value=w.date;
  document.getElementById('exc').innerHTML='';
  (w.exercises||[]).forEach(e=>addExercise(e));
  show('view-new');
}

function saveTemplate(){
  const s=load();
  const w=(s.workouts||[]).find(x=>x.id===_vid);if(!w)return;
  if(!s.templates)s.templates=[];
  if(s.templates.some(t=>t.name===w.name)){toast('Template already exists');return;}
  s.templates.push({id:Date.now(),name:w.name,exercises:(w.exercises||[]).map(e=>({name:e.name,sets:(e.sets||[]).map(s=>({weight:s.weight,reps:s.reps}))}))});
  save(s);toast('Template saved &#x1F4CB;');
}

// ── Repeat + Update ───────────────────────────────────────────
function repeatWorkout(){
  const s=load();
  const w=(s.workouts||[]).find(x=>x.id===_vid);if(!w)return;
  closeView();
  document.getElementById('repeat-title').textContent=w.name;
  document.getElementById('rd').value=td();
  const body=document.getElementById('rb2');body.innerHTML='';
  (w.exercises||[]).forEach(e=>{
    const div=document.createElement('div');
    div.className='eb';div.setAttribute('data-n',e.name);
    div.innerHTML=`
      <div style="font-weight:700;font-size:14px;margin-bottom:9px;color:var(--text)">${e.name}</div>
      <table class="set-table" width="100%">
        <thead><tr><th>#</th><th>kg</th><th>Reps</th><th style="color:var(--text3);font-size:9px">Prev</th></tr></thead>
        <tbody>${(e.sets||[]).map((s,i)=>`<tr class="set-row">
          <td class="set-num">${i+1}</td>
          <td><input class="set-inp" type="number" value="${s.weight}" step="0.5" data-f="w" inputmode="decimal"></td>
          <td><input class="set-inp" type="number" value="${s.reps}" data-f="r" inputmode="numeric"></td>
          <td class="set-prev">${s.weight}&times;${s.reps}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    body.appendChild(div);
  });
  show('view-repeat');
}

function saveRepeat(){
  const s=load();
  const w=(s.workouts||[]).find(x=>x.id===_vid);if(!w)return;
  const date=document.getElementById('rd').value||td();
  const exercises=[];
  document.querySelectorAll('#rb2 .eb').forEach(b=>{
    const name=b.getAttribute('data-n');const sets=[];
    b.querySelectorAll('.set-row').forEach(r=>{
      const wi=r.querySelector('[data-f="w"]'),ri=r.querySelector('[data-f="r"]');
      if(wi&&ri)sets.push({weight:parseFloat(wi.value)||0,reps:parseInt(ri.value)||0});
    });
    exercises.push({name,sets});
  });
  if(!s.workouts)s.workouts=[];
  const prsBefore=getPRs();
  s.workouts.unshift({id:Date.now(),name:w.name,date,exercises,type:'strength',from:w.id});
  save(s);
  const newPRs=checkPRs(exercises,prsBefore);
  show('view-list');renderList();
  showSummary(w.name,exercises,newPRs);
}
function cancelRepeat(){show('view-list');renderList();}

// ── Toast ─────────────────────────────────────────────────────
function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

window.addEventListener('focus',renderList);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)renderList();});
renderList();
</script>
</body>
</html>
