<title>Sleep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07080f;--bg2:#0b0d18;--bg3:#101220;--card:#0d0f1c;--card2:#131628;
  --border:#1a1d2e;--border2:#222538;
  --accent:#a78bfa;--accent-d:rgba(167,139,250,.1);--accent-glow:rgba(167,139,250,.2);
  --blue:#4da6ff;--green:#3dd68c;--yellow:#ffc247;--orange:#ff7c3f;--red:#ff5252;
  --text:#e8e6f8;--text2:#6e6a90;--text3:#302e4a;
  --r:16px;--rs:11px;--rm:22px;
}
html,body{position:fixed;inset:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;width:100%}
#app{display:flex;flex-direction:column;position:fixed;inset:0;max-width:430px;margin:0 auto;width:100%}

.hdr{padding:26px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.hdr-eyebrow{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.hdr-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1}
.hub-link{font-size:10px;color:var(--text3);text-decoration:none;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 12px;font-weight:600;white-space:nowrap}

#scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:24px}
#scroll::-webkit-scrollbar{display:none}

/* TONIGHT LOG CARD */
.log-card{margin:18px 18px 0;background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.log-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--blue))}
.log-inner{padding:16px}

/* HOURS BIG DIAL */
.dial-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 0 10px}
.dial-val{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-2px}
.dial-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:4px}
.hours-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:14px;margin-bottom:6px}
.hr-btn{
  width:44px;height:44px;border-radius:10px;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text3);
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.hr-btn:active{transform:scale(.92)}
.hr-btn.sel{background:var(--accent-d);border-color:rgba(167,139,250,.4);color:var(--accent)}

/* HALF HOUR */
.half-row{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.half-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s}
.half-btn:active{transform:scale(.95)}
.half-btn.sel{background:var(--accent-d);border-color:rgba(167,139,250,.4);color:var(--accent)}

/* QUALITY STARS */
.qual-section{padding:14px 18px 0}
.sec-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.4px;font-weight:700;margin-bottom:10px}
.stars{display:flex;gap:8px;justify-content:center}
.star{font-size:32px;opacity:.2;cursor:pointer;transition:all .2s;filter:grayscale(1)}
.star.on{opacity:1;filter:none;transform:scale(1.1)}
.star:active{transform:scale(.92)}

/* BED/WAKE TIME */
.times-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px 0}
.time-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px}
.time-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
.time-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;text-align:center;outline:none;transition:border-color .15s;-webkit-appearance:none}
.time-input:focus{border-color:rgba(167,139,250,.4)}

/* NOTES */
.notes-wrap{padding:14px 18px 0}
.notes-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;outline:none;resize:none;min-height:64px;line-height:1.5;transition:border-color .15s}
.notes-inp:focus{border-color:rgba(167,139,250,.35)}
.notes-inp::placeholder{color:var(--text3)}

/* SAVE BTN */
.save-wrap{padding:14px 18px}
.save-btn{width:100%;padding:15px;border-radius:var(--rs);background:var(--accent);color:#07080f;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 0 24px var(--accent-glow);transition:all .15s}
.save-btn:active{opacity:.85;transform:scale(.98)}

/* HISTORY */
.sec{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.4px;padding:16px 18px 8px;font-weight:700}
.sleep-item{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin:0 18px 8px;gap:12px}
.si-left{flex:1}
.si-date{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:500}
.si-hrs{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;line-height:1}
.si-hrs.good{color:var(--green)}.si-hrs.ok{color:var(--yellow)}.si-hrs.bad{color:var(--orange)}
.si-notes{font-size:10px;color:var(--text3);margin-top:3px}
.si-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.si-stars{font-size:14px;letter-spacing:1px}
.si-del{background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;padding:0;line-height:1}
.si-del:active{color:var(--red)}

/* WEEKLY SUMMARY */
.week-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 18px 0}
.ws{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 8px;text-align:center}
.ws-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:500;line-height:1}
.ws-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-top:4px;font-weight:700}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--card2);color:var(--text);border:1px solid var(--border2);padding:9px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 32px rgba(0,0,0,.7);white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.em{text-align:center;padding:32px 20px}
.em p{font-size:13px;color:var(--text3);font-weight:500}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-eyebrow">Health Kick</div>
      <div class="hdr-title">&#x1F319; Sleep</div>
    </div>
    <a href="index.html" class="hub-link">&#8592; Hub</a>
  </div>

  <div id="scroll">

    <!-- LOG TONIGHT -->
    <div class="log-card">
      <div class="log-inner">
        <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Log Sleep</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:14px" id="log-date-lbl"></div>

        <!-- HOURS PICKER -->
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px">Hours slept</div>
        <div class="hours-row" id="hours-row">
          <!-- rendered by JS -->
        </div>
        <div class="half-row">
          <button class="half-btn" id="half-0" onclick="setHalf(0)">:00</button>
          <button class="half-btn" id="half-1" onclick="setHalf(1)">:30</button>
        </div>

        <!-- BED / WAKE TIMES -->
        <div class="times-grid" style="padding:0;margin-bottom:14px">
          <div class="time-card">
            <div class="time-lbl">&#x1F6CC; Bed time</div>
            <input class="time-input" type="time" id="bed-time" value="22:30">
          </div>
          <div class="time-card">
            <div class="time-lbl">&#x23F0; Wake time</div>
            <input class="time-input" type="time" id="wake-time" value="06:30">
          </div>
        </div>

        <!-- QUALITY -->
        <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px">Quality</div>
        <div class="stars" id="stars">
          <span class="star" data-q="1" onclick="setQuality(1)">&#x2B50;</span>
          <span class="star" data-q="2" onclick="setQuality(2)">&#x2B50;</span>
          <span class="star" data-q="3" onclick="setQuality(3)">&#x2B50;</span>
          <span class="star" data-q="4" onclick="setQuality(4)">&#x2B50;</span>
          <span class="star" data-q="5" onclick="setQuality(5)">&#x2B50;</span>
        </div>
        <div style="text-align:center;font-size:10px;color:var(--text3);margin-top:6px;font-weight:600" id="quality-lbl"></div>

        <!-- NOTES -->
        <div style="margin-top:14px;margin-bottom:14px">
          <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px">Notes (optional)</div>
          <textarea class="notes-inp" id="sleep-notes" placeholder="Woke up during night, vivid dreams, felt rested&#x2026;" rows="2"></textarea>
        </div>

        <button class="save-btn" onclick="saveSleep()">Save Sleep</button>
      </div>
    </div>

    <!-- WEEKLY SUMMARY -->
    <div class="sec">This Week</div>
    <div class="week-stats" id="week-stats"></div>

    <!-- HISTORY -->
    <div class="sec">Sleep History</div>
    <div id="sleep-history"></div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='ft6';
let _hours=7,_half=0,_quality=0;
const QLBLS=['','Terrible','Poor','Okay','Good','Excellent'];
const QLCOLS=['','var(--red)','var(--orange)','var(--yellow)','var(--green)','var(--accent)'];

function td(){const n=new Date();return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');}
function fd(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function load(){try{const d=localStorage.getItem(KEY);return d?JSON.parse(d):{};}catch(e){return{};}}
function save(s){try{const{dd:_a,cm:_b,...c}=s;localStorage.setItem(KEY,JSON.stringify(c));}catch(e){toast('Storage error');}}

function setHours(h){
  _hours=h;
  document.querySelectorAll('.hr-btn').forEach(b=>{b.classList.toggle('sel',parseInt(b.dataset.h)===h);});
}
function setHalf(v){
  _half=v;
  document.getElementById('half-0').classList.toggle('sel',v===0);
  document.getElementById('half-1').classList.toggle('sel',v===1);
}
function setQuality(q){
  _quality=q;
  document.querySelectorAll('.star').forEach(s=>{s.classList.toggle('on',parseInt(s.dataset.q)<=q);s.style.color=parseInt(s.dataset.q)<=q?QLCOLS[q]:'';});
  const lbl=document.getElementById('quality-lbl');
  lbl.textContent=QLBLS[q];lbl.style.color=QLCOLS[q];
}

function buildHourPicker(){
  const row=document.getElementById('hours-row');
  row.innerHTML=[4,5,6,7,8,9,10].map(h=>`<button class="hr-btn${h===_hours?' sel':''}" data-h="${h}" onclick="setHours(${h})">${h}h</button>`).join('');
}

function saveSleep(){
  if(!_quality){toast('Tap a star to rate your sleep quality');return;}
  const totalHrs=_hours+(_half?0.5:0);
  const s=load();
  if(!s.sleep)s.sleep=[];
  const today=td();
  // Replace today's entry if exists
  const idx=s.sleep.findIndex(e=>e.date===today);
  const entry={
    id:Date.now(),date:today,
    hours:totalHrs,quality:_quality,
    bed:document.getElementById('bed-time').value,
    wake:document.getElementById('wake-time').value,
    notes:document.getElementById('sleep-notes').value.trim()
  };
  if(idx>-1)s.sleep[idx]=entry;else s.sleep.unshift(entry);
  save(s);render();toast('Sleep logged &#x2713;');
  document.getElementById('sleep-notes').value='';
}

function deleteSleep(id){
  const s=load();
  s.sleep=(s.sleep||[]).filter(e=>e.id!==id);
  save(s);render();toast('Removed');
}

function hrsClass(h){if(h>=7.5)return'good';if(h>=6)return'ok';return'bad';}
function hrsLabel(h){if(h>=7.5)return'Great';if(h>=6)return'Okay';return'Short';}

function render(){
  const s=load();
  const entries=(s.sleep||[]).sort((a,b)=>b.date.localeCompare(a.date));

  // Weekly summary
  const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-i);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');});
  const week=entries.filter(e=>last7.includes(e.date));
  const avgHrs=week.length?Math.round(week.reduce((a,e)=>a+e.hours,0)/week.length*10)/10:0;
  const avgQ=week.length?Math.round(week.reduce((a,e)=>a+e.quality,0)/week.length*10)/10:0;
  const nights=week.length;
  document.getElementById('week-stats').innerHTML=`
    <div class="ws"><div class="ws-val" style="color:var(--accent)">${nights}/7</div><div class="ws-lbl">Nights logged</div></div>
    <div class="ws"><div class="ws-val" style="color:${avgHrs>=7.5?'var(--green)':avgHrs>=6?'var(--yellow)':'var(--orange)'}">${avgHrs||'&#x2014;'}h</div><div class="ws-lbl">Avg hours</div></div>
    <div class="ws"><div class="ws-val" style="color:var(--accent)">${avgQ||'&#x2014;'}/5</div><div class="ws-lbl">Avg quality</div></div>`;

  // History
  const hist=document.getElementById('sleep-history');
  if(!entries.length){hist.innerHTML='<div class="em"><p>No sleep logged yet.<br>Log your first night above.</p></div>';return;}
  hist.innerHTML=entries.map(e=>`
    <div class="sleep-item">
      <div class="si-left">
        <div class="si-date">${fd(e.date)}${e.bed&&e.wake?' &middot; '+e.bed+'&#x2192;'+e.wake:''}</div>
        <div class="si-hrs ${hrsClass(e.hours)}">${e.hours}h <span style="font-size:12px;color:var(--text3)">${hrsLabel(e.hours)}</span></div>
        ${e.notes?`<div class="si-notes">${e.notes}</div>`:''}
      </div>
      <div class="si-right">
        <div class="si-stars">${'&#x2B50;'.repeat(e.quality)}${'<span style="opacity:.15">&#x2B50;</span>'.repeat(5-e.quality)}</div>
        <div style="font-size:9px;color:${QLCOLS[e.quality]};font-weight:700">${QLBLS[e.quality]}</div>
        <button class="si-del" onclick="deleteSleep(${e.id})">&#x2715;</button>
      </div>
    </div>`).join('');
}

function toast(m){const t=document.getElementById('toast');t.innerHTML=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);}

// Set date label
const now=new Date();
document.getElementById('log-date-lbl').textContent='For last night &mdash; '+now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});

buildHourPicker();
setHalf(0);
setQuality(4); // default to 4 stars
render();
</script>
</body>
</html>
